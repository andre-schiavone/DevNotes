<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
    <title>Dev Notes</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title"><i class="bi bi-journal-code"></i>DevNotes</h1>
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="search" id="search-input" placeholder="Search...">
            </div>
            <button class="export-btn"><i class="bi bi-download"></i>Export CSV</button>
        </div>
        <div class="add-note">
            <input type="text" id="notes-input" placeholder="What's on your mind?">
            <button class="add-btn"><i class="bi bi-plus-circle"></i></button>
        </div>
        <div class="notes">
        </div>    
    </div>
</body>
</html>
